<div class="container">
    <h2>Create Appointment</h2>
    
      
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" class="form-control" name="name"[(ngModel)]="appointment.name" required>
      </div>

      <div class="form-group">
        <label>Age</label>
        <input type="text" id="age" class="form-control" name="age"[(ngModel)]="appointment.age" required>
      </div>

      <div class="form-group">
        <label>Symptoms</label>
        <input type="text" id="symptoms" class="form-control" name="symptoms"[(ngModel)]="appointment.symptoms" required>
      </div>

      <div class="form-group">
        <label>Number</label>
        <input type="text" id="number" class="form-control" name="number"[(ngModel)]="appointment.number" required>
      </div>
  
     
  
      <button type="submit" class="btn btn-primary"(click)="onSubmit()">Create Appointment</button>
